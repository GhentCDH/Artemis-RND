services:
  proto1:
    image: node:24-alpine
    working_dir: /app

    ports:
      - "5173:5173"

    command: >
      sh -c "
      corepack enable &&
      pnpm install &&
      pnpm run dev -- --host 0.0.0.0 --port 5173
      "

    volumes:
      - ./app:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"