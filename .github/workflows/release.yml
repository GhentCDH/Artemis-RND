name: Release

on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Get current version
        id: version
        run: |
          VERSION=$(jq -r '.version' app/package.json)
          echo "current=$VERSION" >> $GITHUB_OUTPUT
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_PATCH=$((PATCH + 1))
          echo "next=$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT

      - name: Bump version
        run: |
          cd app
          jq '.version = "${{ steps.version.outputs.next }}"' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Generate changelog
        id: changelog
        run: |
          # Get all commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%h %s")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"%h %s")
          fi

          # Parse conventional commits into changelog
          CHANGELOG=$(echo "$COMMITS" | awk '
            BEGIN { feat=""; fix=""; breaking="" }
            /^[a-f0-9]+ feat(\(.+\))?:/ { feat = feat "\n- " substr($0, index($0, $2)) }
            /^[a-f0-9]+ fix(\(.+\))?:/ { fix = fix "\n- " substr($0, index($0, $2)) }
            /BREAKING CHANGE/ { breaking = breaking "\n- " substr($0, index($0, $2)) }
            END {
              if (breaking != "") print "### 🚨 Breaking Changes" breaking
              if (feat != "") print "### ✨ Features" feat
              if (fix != "") print "### 🐛 Bug Fixes" fix
            }
          ')

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git push origin main

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.next }}
          release_name: v${{ steps.version.outputs.next }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
